<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henicks AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #c084fc;
    --glow: rgba(124,106,247,0.25);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --user-bubble: #1e1b3a;
    --ai-bubble: #131320;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-mono);
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,106,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 90%, rgba(192,132,252,0.06) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }

  header {
    position:relative; z-index:10;
    display:flex; align-items:center; gap:12px;
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    background:rgba(10,10,15,0.9); backdrop-filter:blur(12px);
    flex-shrink:0; flex-wrap:wrap;
  }

  .logo-ring {
    width:34px; height:34px; border-radius:50%;
    border:2px solid var(--accent); box-shadow:0 0 12px var(--glow);
    display:flex; align-items:center; justify-content:center;
    animation:pulse-ring 3s ease-in-out infinite; flex-shrink:0;
  }
  @keyframes pulse-ring {
    0%,100%{box-shadow:0 0 8px var(--glow);}
    50%{box-shadow:0 0 20px rgba(124,106,247,0.5);}
  }
  .logo-dot {
    width:10px; height:10px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    animation:pulse-dot 3s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100%{transform:scale(1);opacity:1;}
    50%{transform:scale(1.2);opacity:0.8;}
  }
  .header-info { flex:1; min-width:0; }
  .header-title {
    font-family:var(--font-head); font-size:15px; font-weight:700;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .header-sub { font-size:10px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }

  .model-select-wrap {
    display:flex; align-items:center; gap:6px; flex-shrink:0;
  }
  .model-select-wrap label { font-size:10px; color:var(--muted); letter-spacing:0.05em; }
  #modelSelect {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--accent2); font-family:var(--font-mono); font-size:10px;
    padding:4px 8px; border-radius:8px; outline:none; cursor:pointer;
  }

  .status-badge {
    display:flex; align-items:center; gap:5px;
    font-size:10px; color:var(--muted); flex-shrink:0;
  }
  .status-dot {
    width:7px; height:7px; border-radius:50%;
    background:#4ade80; box-shadow:0 0 6px rgba(74,222,128,0.5);
    animation:blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  #messages {
    flex:1; overflow-y:auto; padding:18px 14px;
    display:flex; flex-direction:column; gap:16px;
    position:relative; z-index:1; scroll-behavior:smooth;
  }
  #messages::-webkit-scrollbar { width:4px; }
  #messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .msg-row {
    display:flex; gap:10px;
    animation:fadeSlide 0.3s ease forwards; opacity:0;
  }
  @keyframes fadeSlide {
    from{opacity:0;transform:translateY(12px);}
    to{opacity:1;transform:translateY(0);}
  }
  .msg-row.user { flex-direction:row-reverse; }

  .avatar {
    width:30px; height:30px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; font-family:var(--font-head); margin-top:2px;
  }
  .avatar.ai { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:0 0 10px var(--glow); }
  .avatar.user { background:var(--surface2); border:1px solid var(--border); color:var(--accent2); }

  .bubble {
    max-width:calc(100% - 56px);
    padding:11px 15px; border-radius:16px;
    font-size:13.5px; line-height:1.65; white-space:pre-wrap; word-break:break-word;
  }
  .bubble.ai { background:var(--ai-bubble); border:1px solid var(--border); border-top-left-radius:4px; }
  .bubble.user { background:var(--user-bubble); border:1px solid rgba(124,106,247,0.3); border-top-right-radius:4px; }

  .typing-dots { display:flex; gap:5px; padding:6px 4px; align-items:center; }
  .typing-dots span {
    width:7px; height:7px; border-radius:50%;
    background:var(--accent); opacity:0.4;
    animation:dot-bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2){animation-delay:0.2s;}
  .typing-dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes dot-bounce {
    0%,100%{transform:translateY(0);opacity:0.4;}
    50%{transform:translateY(-6px);opacity:1;}
  }

  .welcome {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:12px; text-align:center; padding:30px 20px;
    animation:fadeSlide 0.5s ease forwards; opacity:0;
  }
  .welcome-icon {
    width:58px; height:58px; border-radius:50%;
    border:2px solid var(--accent); box-shadow:0 0 28px var(--glow);
    display:flex; align-items:center; justify-content:center;
    background:var(--surface); font-size:24px;
  }
  .welcome h2 {
    font-family:var(--font-head); font-size:21px; font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .welcome p { font-size:12px; color:var(--muted); max-width:260px; line-height:1.7; }
  .welcome-chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:4px; }
  .chip {
    padding:7px 13px; border:1px solid var(--border); border-radius:20px;
    font-size:11px; color:var(--muted); background:var(--surface);
    cursor:pointer; transition:all 0.2s;
  }
  .chip:hover,.chip:active { border-color:var(--accent); color:var(--accent2); background:rgba(124,106,247,0.08); }

  .input-area {
    position:relative; z-index:10;
    padding:10px 14px 14px;
    background:rgba(10,10,15,0.95); backdrop-filter:blur(12px);
    border-top:1px solid var(--border); flex-shrink:0;
  }
  .input-wrap {
    display:flex; align-items:flex-end; gap:9px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:20px; padding:9px 11px 9px 15px;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,106,247,0.1); }
  #userInput {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-family:var(--font-mono); font-size:13px;
    line-height:1.5; resize:none; max-height:120px; overflow-y:auto; min-height:22px;
  }
  #userInput::placeholder { color:var(--muted); }
  #sendBtn {
    width:34px; height:34px; border-radius:50%; border:none;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:transform 0.15s, opacity 0.2s;
    box-shadow:0 0 14px var(--glow);
  }
  #sendBtn:hover{transform:scale(1.07);}
  #sendBtn:active{transform:scale(0.95);}
  #sendBtn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  #sendBtn svg{width:15px;height:15px;}

  .input-hint { font-size:9.5px; color:var(--muted); text-align:center; margin-top:7px; opacity:0.5; }

  #errorToast {
    display:none; position:fixed; bottom:86px; left:50%; transform:translateX(-50%);
    background:#3a1020; border:1px solid #7f1d3a; color:#fca5a5;
    padding:9px 16px; border-radius:10px; font-size:11.5px;
    z-index:999; max-width:90vw; text-align:center;
  }
</style>
</head>
<body>

<header>
  <div class="logo-ring"><div class="logo-dot"></div></div>
  <div class="header-info">
    <div class="header-title">Henicks AI</div>
    <div class="header-sub">Z.ai · GLM · Henicks Field Tech</div>
  </div>
  <div class="model-select-wrap">
    <label>Model:</label>
    <select id="modelSelect">
      <option value="glm-4-air">glm-4-air</option>
      <option value="glm-4-airx">glm-4-airx</option>
      <option value="glm-4-plus">glm-4-plus</option>
      <option value="glm-4-long">glm-4-long</option>
      <option value="glm-4">glm-4</option>
      <option value="glm-4-0520">glm-4-0520</option>
    </select>
  </div>
  <div class="status-badge">
    <span class="status-dot"></span><span>ONLINE</span>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <h2>Hello, I'm Henicks AI</h2>
    <p>Powered by GLM from Z.ai. If one model gives an error, switch models in the top-right dropdown.</p>
    <div class="welcome-chips">
      <span class="chip" onclick="sendChip(this)">✍️ Write something</span>
      <span class="chip" onclick="sendChip(this)">💡 Explain a concept</span>
      <span class="chip" onclick="sendChip(this)">🧠 Help me think</span>
      <span class="chip" onclick="sendChip(this)">🔧 Fix my code</span>
    </div>
  </div>
</div>

<div id="errorToast"></div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="userInput" placeholder="Ask me anything..." rows="1" maxlength="4000"></textarea>
    <button id="sendBtn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
  const API_KEY = "60b7a4b45f0c4f178c3c42fa1a92bb88.XZKfo8Js0s27zh8r";
  const API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";

  const SYSTEM = `You are Henicks AI, a sharp, friendly, and highly capable AI assistant built for Henry at Henicks GPT Field Tech. Be helpful, concise, and a bit witty. Excel at coding, writing, reasoning, and creative problem-solving.`;

  let history = [];
  let isLoading = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const welcomeEl = document.getElementById('welcome');
  const errorToast = document.getElementById('errorToast');
  const modelSelect = document.getElementById('modelSelect');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isLoading) sendMessage(); }
  });

  function sendChip(el) {
    inputEl.value = el.textContent.replace(/^.{2}\s/, '').trim();
    sendMessage();
  }

  function showError(msg) {
    errorToast.textContent = '⚠ ' + msg;
    errorToast.style.display = 'block';
    setTimeout(() => errorToast.style.display = 'none', 5000);
  }

  function appendMessage(role, content) {
    welcomeEl.style.display = 'none';
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const av = document.createElement('div');
    av.className = `avatar ${role}`;
    av.textContent = role === 'ai' ? 'H' : 'U';
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = content;
    row.appendChild(av); row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function showTyping() {
    welcomeEl.style.display = 'none';
    const row = document.createElement('div');
    row.className = 'msg-row ai'; row.id = 'typingRow';
    const av = document.createElement('div');
    av.className = 'avatar ai'; av.textContent = 'H';
    const bubble = document.createElement('div');
    bubble.className = 'bubble ai';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    row.appendChild(av); row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingRow');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    inputEl.value = ''; inputEl.style.height = 'auto';
    isLoading = true; sendBtn.disabled = true;

    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    const model = modelSelect.value;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + API_KEY
        },
        body: JSON.stringify({
          model,
          messages: [{ role: 'system', content: SYSTEM }, ...history],
          max_tokens: 1024,
          temperature: 0.7
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || '(No response)';
      removeTyping();
      appendMessage('ai', reply);
      history.push({ role: 'assistant', content: reply });
      if (history.length > 20) history = history.slice(-20);

    } catch (err) {
      removeTyping();
      appendMessage('ai', '⚠ Error: ' + err.message + '\n\nTry switching the model in the top dropdown.');
      history.pop();
      showError(err.message);
    }

    isLoading = false; sendBtn.disabled = false; inputEl.focus();
  }
</script>
</body>
</html>
